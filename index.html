<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.css">
    <link rel="stylesheet" href="css/css.css">
    <title>Coins</title>
</head>
<body>
    <div class="vh-100 background">
    <div class="sticky-top bg-black ">
        <p class="container text-warning fw-bolder fs-3 py-3 text-end">Currency-Converter</p>
    </div>
    <div class="main mt-5 container text-center d-flex justify-content-center align-items-center ">
        <div class="mydiv p-5  border rounded col-11  col-sm-10 d-flex flex-column gap-3">
        <p class="text-light text-start">Amount</p>
        <div class="d-flex gap-3">
    <input placeholder="1 By Default"class="myinput form-control bg-transparent text-white border-white ">
    <i class="icon fa-solid fa-right-left p-2 text-warning "style="cursor: pointer;"></i>
    </div>

    <div class="position-relative ">
    <select class="form-select my-3 bg-transparent text-light selecttop" aria-label="Default select example">
    <option value="AED">AED || United Arab Dirham</option>
    </select>
    
     <img src="image/OIP.webp" width="20" class="image img_top">
    
    </div>
    <div class="position-relative">
    <select class="form-select my-3 bg-transparent text-light selectbtm" aria-label="Default select example">
    <option value="AED">AED || United Arab Dirham</option>
    </select>
     
     <img src="image/OIP.webp" width="20" class="image img_btm">
    
    </div>
    <button class="convert py-2 btn btn-warning my-3">Convert</button>
    <h1 class="text-light">1 AED = 1 AED </h1>
  </div>

    </div>
    </div>





    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/countries.js"></script>
    <script src="js/java.js"></script>
</body>
</html>
